<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO CONTROL PANEL - PINK WHITE EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #fe2c55; 
            --light-pink: #fff0f3;
            --neon-pink: #ff85a1;
            --bg: #fff0f3; 
            --panel: #ffffff; 
            --system-msg: #2ecc71; 
        }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            color: #444;
            margin: 0; 
            padding: 15px; 
            display: flex; 
            gap: 15px; 
            height: 100vh; 
            box-sizing: border-box; 
            overflow: hidden; /* Ngăn toàn bộ trang bị kéo dài */
        }
        
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .left-col { width: 100% !important; }
            .right-col { height: 480px !important; min-height: 480px; }
        }

        .widgets { 
            background: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #fff;
            box-shadow: 0 5px 15px rgba(254, 44, 85, 0.1);
        }
        #clock { font-size: 28px; font-weight: 700; color: var(--pink); margin-bottom: 5px; }
        #date-container { font-size: 13px; color: #888; font-weight: bold; }
        .lunar-txt { color: #d63384; }

        .left-col { width: 320px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .card { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #fff; 
            box-shadow: 0 8px 20px rgba(254, 44, 85, 0.05);
        }
        
        .neon-border { border: 2px solid var(--pink); box-shadow: 0 0 10px var(--neon-pink); }

        .right-col { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--panel); border-radius: 25px; 
            border: 2px solid #fff; overflow: hidden; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            height: calc(100vh - 30px); /* Cố định chiều cao theo màn hình */
        }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column-reverse; 
            scrollbar-width: thin;
            padding-right: 5px;
        }

        /* Tùy chỉnh thanh cuộn cho đẹp */
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--light-pink); border-radius: 10px; }

        .msg { padding: 12px; border-bottom: 1px solid #fdf0f2; font-size: 15px; animation: slide 0.3s ease; line-height: 1.4; }
        .msg.system { color: var(--system-msg); font-weight: bold; }
        .msg.user { color: #444; }
        @keyframes slide { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"] { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; 
            background: #fafafa; color: #333; outline: none; margin-bottom: 10px; box-sizing: border-box; 
        }
        button.conn-btn { 
            width: 100%; padding: 12px; background: var(--pink); color: white; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button.conn-btn:hover { box-shadow: 0 5px 15px var(--neon-pink); opacity: 0.9; }
        
        .sw-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: bold; }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(18px); }

        .control-box { margin-top: 15px; font-size: 12px; background: #fdf2f4; padding: 12px; border-radius: 15px; }
        input[type="range"] { width: 100%; accent-color: var(--pink); cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="left-col">
        <div class="widgets">
            <div id="clock">00:00:00</div>
            <div id="date-container">
                <span id="date-solar">Đang tải...</span> | <span class="lunar-txt" id="date-lunar">...</span>
            </div>
        </div>

        <div class="card neon-border">
            <h3 style="margin: 0 0 15px 0; color: var(--pink); text-align: center;">KẾT NỐI LIVE</h3>
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="conn-btn" id="btnConn" onclick="start()">KẾT NỐI NGAY</button>
            <div id="stt" style="font-size: 11px; text-align: center; margin-top: 8px; color: #999;">Chưa kết nối</div>
        </div>

        <div class="card">
            <h3 style="margin: 0 0 10px 0; font-size: 15px; color: var(--pink);">ĐIỀU KHIỂN</h3>
            <div class="sw-item"><span>Tắt tiếng hệ thống:</span><label class="switch"><input type="checkbox" id="masterMute"><span class="slider"></span></label></div>
            <div class="sw-item"><span>Ẩn cmt hệ thống:</span><label class="switch"><input type="checkbox" id="hideSystem"><span class="slider"></span></label></div>
            <div class="sw-item"><span>Chào khách:</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>Đọc Quà:</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>Nhắc PK:</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>Trợ lý:</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            
            <div class="control-box">
                <b>TỐC ĐỘ ĐỌC: <span id="speedVal" style="color:var(--pink)">1.0</span>x</b>
                <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('speedVal').innerText=this.value">
            </div>

            <div class="control-box">
                <b>ÂM LƯỢNG: <span id="volVal" style="color:var(--pink)">100</span>%</b>
                <input type="range" id="masterVolume" min="0" max="1" step="0.1" value="1" oninput="document.getElementById('volVal').innerText=Math.round(this.value*100)">
            </div>
        </div>
        <a href="/admin" target="_blank" style="color:var(--pink); text-align:center; display:block; font-size:12px; text-decoration:none; font-weight:bold;">⚙️ QUẢN LÝ DỮ LIỆU</a>
    </div>

    <div class="right-col">
        <h3 style="margin: 0 0 15px 0; color: var(--pink); border-bottom: 2px solid var(--light-pink); padding-bottom: 10px;">BÌNH LUẬN TRỰC TIẾP</h3>
        <div id="chat"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/moment/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment/locale/vi.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-lunar/moment-lunar.min.js"></script>
    <script>
        const socket = io();
        let queue = [], playing = false;
        let currentUserId = "";

        moment.locale('vi');

        function updateTime() {
            const now = moment();
            document.getElementById('clock').innerText = now.format('HH:mm:ss');
            document.getElementById('date-solar').innerText = now.format('dddd, DD/MM/YYYY');
            const lunar = now.lunar();
            document.getElementById('date-lunar').innerText = `Âm: ${lunar.format('DD/MM')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function start() {
            const u = document.getElementById('user').value;
            if(u) {
                currentUserId = u;
                socket.emit('set-username', u);
                document.getElementById('btnConn').innerText = "ĐANG KẾT NỐI...";
            }
        }

        socket.on('status', m => {
            document.getElementById('stt').innerText = m;
            if (m.includes("Đã kết nối")) {
                document.getElementById('btnConn').innerText = "ĐÃ KẾT NỐI";
                document.getElementById('btnConn').style.background = "#2ecc71";
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('stt').innerText = "Mất kết nối server, đang thử lại...";
            if(currentUserId) setTimeout(() => socket.emit('set-username', currentUserId), 5000);
        });

        socket.on('audio-data', d => {
            const isSystem = ['welcome', 'gift', 'pk', 'bot'].includes(d.type);
            if (isSystem && document.getElementById('hideSystem').checked) return;

            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${isSystem ? 'system' : 'user'}`;
            const nameColor = isSystem ? 'var(--system-msg)' : 'var(--pink)';
            div.innerHTML = `<b style="color:${nameColor}">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            // Giữ lại 50 cmt trong bộ nhớ nhưng chỉ hiển thị 12 dòng đầu nhờ khung cố định
            if (chat.childNodes.length > 50) chat.removeChild(chat.lastChild);

            if (d.audio && !document.getElementById('masterMute').checked) {
                if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.volume = parseFloat(document.getElementById('masterVolume').value);
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
